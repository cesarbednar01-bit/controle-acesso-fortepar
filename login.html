<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Controle de Acesso</title>

    <link rel="stylesheet" href="css/login.css">

</head>

<body>

    <div class="login-container">

        <div class="login-card">

            <div class="login-header">

                <img src="assets/logo-fortepar-recortada.png" alt="Fortepar" class="login-logo">

                <h1>Controle de Acesso</h1>

                <p>
                    Sistema de Controle de Entrada e Saída
                </p>

            </div>

            <div class="form-group">

                <label for="usuario">
                    Usuário
                </label>

                <input type="text" id="usuario" placeholder="Digite seu usuário" autocomplete="username">

            </div>

            <div class="form-group">

                <label for="senha">
                    Senha
                </label>

                <input type="password" id="senha" placeholder="Digite sua senha" autocomplete="current-password">

            </div>

            <button onclick="login()">
                Entrar no Sistema
            </button>

            <div class="footer">

                <p>
                    © 2026 Controle de Acesso
                </p>

            </div>

        </div>

    </div>

    <script src="js/auth.js"></script>

</body>

</html>
